<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        #mainSection,
        #favoritesSection {
            position: relative;
            z-index: 5;
        }

        h1 {
            text-shadow: 3px 2px 5px darkslategray;
            color: white;
            text-align: center;
        }

        .cloud {
            position: absolute;
            width: 120px;
            height: 70px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.85));
            border-radius: 50px;
            box-shadow: -30px 10px 0 10px rgba(255, 255, 255, 0.9),
            -10px -10px 0 12px rgba(255, 255, 255, 0.85),
            20px -15px 0 15px rgba(255, 255, 255, 0.9),
            45px 5px 0 12px rgba(255, 255, 255, 0.88);
            filter: blur(0.8px);
            z-index: 0;
        }

        .cloud1 {
            top: 15%;
            left: -150px;
            animation: moveCloud1 80s linear infinite;
        }

        .cloud2 {
            top: 30%;
            left: 30%;
            animation: moveCloud2 65s linear infinite;
        }

        .cloud3 {
            top: 45%;
            left: 60%;
            animation: moveCloud3 90s linear infinite;
        }

        @keyframes moveCloud1 {
            0% {
                left: -150px;
                opacity: 1;
                transform: scale(0.8);
            }
            95% {
                opacity: 1;
            }
            100% {
                left: 100vw;
                opacity: 0;
                transform: scale(0.8);
            }
        }

        @keyframes moveCloud2 {
            0% {
                left: 30%;
                opacity: 1;
                transform: scale(1.1);
            }
            70% {
                left: 100vw;
                opacity: 1;
            }
            71% {
                opacity: 0;
                left: 100vw;
            }
            72% {
                left: -200px;
                opacity: 0;
            }
            80% {
                opacity: 1;
            }
            100% {
                left: 30%;
                opacity: 1;
            }
        }

        @keyframes moveCloud3 {
            0% {
                left: 60%;
                opacity: 1;
                transform: scale(0.9);
            }
            40% {
                left: 100vw;
                opacity: 1;
            }
            41% {
                opacity: 0;
                left: 100vw;
            }
            42% {
                left: -200px;
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                left: 60%;
                opacity: 1;
            }
        }

        .stars {
            position: fixed;
            inset: 0;
            background: #031623;
            z-index: 0;
            display: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
        }

        .app {
            padding: 10px 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
            border: none;
            background-color: rgb(21, 89, 149);
            color: white;
            border-radius: 6px;
        }

        #place_holder {
            width: 500px;
            margin: 0 auto;
            padding: 10px;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 1px solid #fff;
        }

        #cityInput {
            background-color: rgba(255, 255, 255, 0.2);
            border: 0;
            outline: none;
        }

        #error {
            color: red;
            margin-top: 10px;
            font-style: italic;
        }

        .weather-card {
            padding: 15px;
            border-radius: 10px;
            background: #f3f3f3;
            opacity: 0;
            transform: translateY(-30px) scale(0.95);
            transition: all 0.5s ease;
            margin-top: 20px;
        }

        .weather-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        #detials {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid white;
            margin-top: 15px;
            padding-top: 10px;
        }

        .sunny {
            background: linear-gradient(to top, #fceabb, #f8b500);
        }

        .cloudy {
            background: linear-gradient(to top, #d7dde8, #a1a8b7);
        }

        .rainy {
            background: linear-gradient(to top, #74b9ff, #0984e3);
        }

        .snowy {
            background: linear-gradient(to top, #d4dce6, #9fb1b3);
        }

        #buttons {
            display: none;
            margin-top: 10px;
            justify-content: center;
        }

        #forecastContainer {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            perspective: 1000px;
        }

        .forecast-day {
            flex: 1;
            background-color: rgb(21, 89, 149);
            color: white;
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            width: 80px;
            height: 120px;
            position: relative;
            cursor: pointer;
        }

        .forecast-day:hover {
            transform: rotateY(180deg) scale(1.05);
        }

        .forecast-front,
        .forecast-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .forecast-front {
            background: rgba(21, 89, 149, 0.8);
        }

        .forecast-back {
            background: rgba(88, 144, 195, 0.9);
            transform: rotateY(180deg);
        }

        #favoritesSection {
            display: none;
            width: 400px;
            text-align: center;
        }

        .fav-item {
            background: white;
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .fav-item:hover {
            background: #eee;
        }

        .fav-item.active {
            border: 2px solid #66a6ff;
        }

        .fav-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease, padding 0.3s ease;
        }

        .fav-item.active .fav-details {
            max-height: 500px;
            padding: 10px;
        }

        .fav-item.removing {
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.5s ease;
        }

        .save-btn {
            position: absolute;
            top: 10px;
            right: 12px;
            background: rgba(255, 255, 255, 0.25);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
            width: 45px;
            height: 45px;

        }

        .polaroid-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            display: none;
        }

        .polaroid {
            position: absolute;
            background: white;
            padding: 10px 10px 15px 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 200px;
        }

        .polaroid img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .polaroid-caption {
            margin-top: 10px;
            font-size: 13px;
            color: #333;
            font-weight: bold;
            text-align: center;
            word-wrap: break-word;
            width: 100%;
        }


        .polaroid.show {
            opacity: 1;
            transform: scale(1) rotate(var(--angle));
        }

        .left-1 {
            left: 5%;
            top: 15%;
            --angle: -8deg;
        }

        .left-2 {
            left: 8%;
            top: 55%;
            --angle: 5deg;
        }

        .right-1 {
            right: 5%;
            top: 15%;
            --angle: 7deg;
        }

        .right-2 {
            right: 8%;
            top: 55%;
            --angle: -6deg;
        }

        .context-save-message {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.5s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .context-save-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .center-save-message.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            animation: floatBounce 2.5s ease-in-out forwards;
        }

        @keyframes floatBounce {
            0% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
            }
            20% {
                transform: translate(-50%, -55%) scale(1.05) rotate(-2deg);
            }
            40% {
                transform: translate(-50%, -50%) scale(1.1) rotate(2deg);
            }
            60% {
                transform: translate(-50%, -52%) scale(1.05) rotate(-1deg);
            }
            80% {
                transform: translate(-50%, -50%) scale(1) rotate(1deg);
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
            }
        }

        #saveCityBtn {
            display: inline-block;
            font-size: 24px;
            transition: transform 0.2s ease, text-shadow 0.2s ease;
        }

        #saveCityBtn:hover {
            transform: scale(1.5);
            text-shadow: 0 0 8px gold;
        }

        #backBtn:hover {
            transform: scale(1.25);
            text-shadow: 0 0 8px gold;
        }


        #openFavoritesBtn:hover {
            transform: scale(1.25);
            text-shadow: 0 0 8px gold;
        }

        #searchBtn:hover {
            transform: scale(1.25);
            text-shadow: 0 0 8px gold;
        }

        .footer {
            position: fixed;
            bottom: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            width: 100%;
        }

        .footer p {
            margin: 0;
            letter-spacing: 0.5px;
        }

        .footer a {
            cursor: pointer;
            color: darkblue;
        }
        .shooting-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px white, 0 0 15px white;
            opacity: 0;
        }
        .shooting-star::after {
            content: "";
            position: absolute;
            width: 80px;
            height: 2px;
            background: linear-gradient(to right, white, transparent);
            top: 50%;
            left: -80px;
        }

        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(45deg);
                opacity: 1;
            }
            100% {
                transform: translate(400px, 400px) rotate(45deg);
                opacity: 0;
            }
        }
    </style>

</head>
<body>
<div class="polaroid-container" id="photoContainer">
    <div class="polaroid left-1"><img id="img-L1"></div>
    <div class="polaroid left-2"><img id="img-L2"></div>
    <div class="polaroid right-1"><img id="img-R1"></div>
    <div class="polaroid right-2"><img id="img-R2"></div>
</div>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>
<div class="stars" id="stars"></div>

<div id="mainSection">
    <div id="title">
        <h1>Weather App</h1>
        <p style="font-style: oblique; color: slategray; text-align: center; margin-top: -10px; margin-bottom: 10px;">
            Enter the city name you want to see the forecast
        </p>
    </div>
    <div class="app">
        <div id="place_holder">
            ➤ <input type="text" id="cityInput" placeholder="Enter the city name...">
            <button id="searchBtn">🔍︎</button>
            <button id="openFavoritesBtn">★</button>
        </div>
        <div class="error" id="error"></div>
        <div id="weatherCard"></div>
        <div id="buttons">
            <button id="showForecastBtn">Show 5-day forecast</button>
        </div>
        <div id="forecastContainer"></div>
    </div>
</div>

<div id="favoritesSection">
    <h1>Favorite Cities</h1>
    <div id="favoritesList"></div>
    <button id="backBtn">🏠︎</button>
</div>
<div id="contextSaveMessage" class="context-save-message"></div>

<footer class="footer">
    <p>© 2026 Weather App • Created by <a href="https://github.com/milajovanovska" target="_blank">Mila Jovanovska</a>
    </p>
</footer>

<script src="script.js"></script>
</body>
</html>
